<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MicroFit Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="main-container">

    <div class="login-card">

        <!-- LEFT PANEL -->

        <div class="left-panel">

            <h1 class="logo">
                🏋️ MicroFit
            </h1>

            <h3>
                Welcome Back
            </h3>

            <p>
                Track workouts, monitor progress,
                and achieve your fitness goals.
            </p>

            <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                    class="custom-input">

            <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    class="custom-input">

            <button
                    class="login-btn"
                    onclick="login()">

                LOGIN

            </button>

            <p id="message"
               class="mt-3">
            </p>

        </div>

        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <img
                    src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600"
                    alt="Fitness">

        </div>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
